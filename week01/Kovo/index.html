<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HERO TODO</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="todo">
    <div class="todo__card">
      <h1 class="todo__title">HERO TODO</h1>

      <div class="todo__form">
        <input
          type="text"
          id="todo-input"
          class="todo__input"
          placeholder="해야 할 일을 입력하세요"
        />
        <button id="add-btn" class="todo__add-button">할 일 추가</button>
      </div>

      <div class="todo__content">
        <div class="todo__section">
          <h2 class="todo__section-title">할 일</h2>
          <ul id="todo-list" class="todo__list"></ul>
        </div>

        <div class="todo__section">
          <h2 class="todo__section-title">완료</h2>
          <ul id="done-list" class="todo__list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="./dist/main.js"></script>
</body>
</html>
